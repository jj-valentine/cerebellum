<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow halos -->
  <circle cx="54" cy="60" r="32" fill="url(#glow)"/>
  <circle cx="108" cy="34" r="22" fill="url(#glow)"/>
  <circle cx="108" cy="86" r="22" fill="url(#glow)"/>

  <!-- Edges -->
  <line x1="54" y1="60" x2="108" y2="34" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="54" y1="60" x2="108" y2="86" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="108" y1="34" x2="108" y2="86" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="108" y1="34" x2="148" y2="52" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="108" y1="86" x2="148" y2="68" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="148" y1="52" x2="148" y2="68" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Nodes -->
  <circle cx="54"  cy="60" r="9" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="108" cy="34" r="6" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="108" cy="86" r="6" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="148" cy="52" r="5" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="148" cy="68" r="5" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Node dots -->
  <circle cx="54"  cy="60" r="3.5" fill="#a78bfa"/>
  <circle cx="108" cy="34" r="2.5" fill="#8b5cf6"/>
  <circle cx="108" cy="86" r="2.5" fill="#8b5cf6"/>
  <circle cx="148" cy="52" r="2"   fill="#7c3aed"/>
  <circle cx="148" cy="68" r="2"   fill="#7c3aed"/>

  <!-- Wordmark -->
  <text x="175" y="53" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="700" letter-spacing="-1" fill="#f5f3ff">cerebellum</text>
  <text x="176" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="400" letter-spacing="0.5" fill="#7c3aed">personal agent-readable second brain</text>
</svg>
