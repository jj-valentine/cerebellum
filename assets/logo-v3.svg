<svg xmlns="http://www.w3.org/2000/svg" width="500" height="120" viewBox="0 0 500 120">
  <defs>
    <style>
      .wm-v3  { fill: #166534; }
      .sub-v3 { fill: #15803d; opacity: 0.75; }
      .cur-v3 { fill: #16a34a; }
      @media (prefers-color-scheme: dark) {
        .wm-v3  { fill: #4ade80; }
        .sub-v3 { fill: #86efac; opacity: 0.75; }
        .cur-v3 { fill: #4ade80; }
      }
    </style>
  </defs>

  <!-- Terminal window body -->
  <rect x="8" y="14" width="92" height="92" rx="7" fill="#0d1117"/>
  <rect x="8" y="14" width="92" height="92" rx="7" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Traffic lights -->
  <circle cx="23" cy="29" r="4.5" fill="#ff5f57"/>
  <circle cx="36" cy="29" r="4.5" fill="#febc2e"/>
  <circle cx="49" cy="29" r="4.5" fill="#28c840"/>

  <!-- Titlebar separator -->
  <line x1="8" y1="39" x2="100" y2="39" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Scanlines -->
  <line x1="8" y1="52" x2="100" y2="52" stroke="#22c55e" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="8" y1="60" x2="100" y2="60" stroke="#22c55e" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="8" y1="68" x2="100" y2="68" stroke="#22c55e" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="8" y1="76" x2="100" y2="76" stroke="#22c55e" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="8" y1="84" x2="100" y2="84" stroke="#22c55e" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="8" y1="92" x2="100" y2="92" stroke="#22c55e" stroke-width="0.3" stroke-opacity="0.06"/>

  <!-- Prompt line 1 -->
  <text x="16" y="58" font-family="'Courier New',Courier,monospace" font-size="12"
        font-weight="700" fill="#22c55e">&gt; recall(</text>

  <!-- String argument -->
  <text x="16" y="73" font-family="'Courier New',Courier,monospace" font-size="12"
        fill="#a78bfa">  "memory"</text>

  <!-- Close + cursor -->
  <text x="16" y="88" font-family="'Courier New',Courier,monospace" font-size="12"
        font-weight="700" fill="#22c55e">)▊</text>
  <rect x="29" y="76" width="7" height="13" fill="#4ade80" fill-opacity="0.9">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Wordmark -->
  <text x="116" y="52"
        font-family="'Courier New',Courier,monospace"
        font-size="30" font-weight="700" letter-spacing="-0.5"
        class="wm-v3">cerebellum</text>

  <!-- Subtitle -->
  <text x="118" y="74" class="sub-v3"
        font-family="'Courier New',Courier,monospace"
        font-size="11.5" letter-spacing="0">// personal agent-readable second brain</text>
</svg>
