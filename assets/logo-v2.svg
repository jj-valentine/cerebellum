<svg xmlns="http://www.w3.org/2000/svg" width="500" height="120" viewBox="0 0 500 120">
  <defs>
    <style>
      .sub-v2 { fill: #1d4ed8; }
      @media (prefers-color-scheme: dark) { .sub-v2 { fill: #93c5fd; } }
    </style>
    <clipPath id="clip-v2">
      <circle cx="58" cy="60" r="33"/>
    </clipPath>
    <linearGradient id="ring-v2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="pulse-v2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="wm-v2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow-v2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d946ef" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="58" cy="60" r="46" fill="url(#glow-v2)"/>

  <!-- Circle ring -->
  <circle cx="58" cy="60" r="36" fill="none" stroke="url(#ring-v2)" stroke-width="2"/>

  <!-- Neural pulse clipped to circle -->
  <g clip-path="url(#clip-v2)">
    <path d="M 25 60 L 38 60 L 43 40 L 49 80 L 55 40 L 61 60 L 91 60"
          fill="none" stroke="url(#pulse-v2)" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="118" y="53"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="34" font-weight="700" letter-spacing="-1"
        fill="url(#wm-v2)">cerebellum</text>
  <text x="120" y="76" class="sub-v2"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12.5" font-weight="400" letter-spacing="0.3">personal agent-readable second brain</text>
</svg>
