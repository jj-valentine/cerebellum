<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cerebellum Logo Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f0;
      padding: 40px;
      color: #111;
    }

    h1 { font-size: 13px; font-weight: 500; color: #888; letter-spacing: 2px;
         text-transform: uppercase; margin-bottom: 32px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 1100px;
    }

    .col-label {
      font-size: 10px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 10px; color: #aaa;
    }

    .cell {
      border-radius: 10px;
      padding: 28px 24px;
      display: flex;
      align-items: center;
    }
    .cell.light { background: #ffffff; border: 1px solid #e5e5e5; }
    .cell.dark  { background: #0f0f14; border: 1px solid #1e1e2e; }

    .variant-label {
      font-size: 10px; color: #999; letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 6px;
      font-family: 'Courier New', monospace;
    }

    .row { margin-bottom: 32px; }
    .row-header {
      font-size: 11px; color: #666; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 10px;
      font-weight: 600;
    }

    /* Force light mode colors on .light cells */
    .cell.light .sub-v1, .cell.light .sub-v2 { fill: #1d4ed8 !important; }
    .cell.light .wm-v3  { fill: #166534 !important; }
    .cell.light .sub-v3 { fill: #15803d !important; }

    /* Force dark mode colors on .dark cells */
    .cell.dark .sub-v1, .cell.dark .sub-v2 { fill: #93c5fd !important; }
    .cell.dark .wm-v3  { fill: #4ade80 !important; }
    .cell.dark .sub-v3 { fill: #86efac !important; }
  </style>
</head>
<body>
  <h1>Cerebellum — Logo Variants</h1>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:1100px;margin-bottom:8px;">
    <div class="col-label">☀️  Light background</div>
    <div class="col-label">🌙  Dark background</div>
  </div>
