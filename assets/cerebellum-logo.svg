<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="280" viewBox="-90 -20 560 140">
  <defs>
    <style>
      .sub-v5   { fill: #6d28d9; }
      .term-bg  { fill: #0a0014; }
      @media (prefers-color-scheme: dark) {
        .sub-v5  { fill: #c4b5fd; }
        .term-bg { fill: #2d0060; }
      }
    </style>
    <linearGradient id="term-v5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="wm-v5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow-v5m" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-v5s" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow behind main (terminal) node -->
  <circle cx="34" cy="60" r="28" fill="url(#glow-v5m)"/>

  <!-- Secondary node glows -->
  <circle cx="74" cy="36" r="16" fill="url(#glow-v5s)"/>
  <circle cx="74" cy="84" r="16" fill="url(#glow-v5s)"/>

  <!-- Edges -->
  <line x1="34" y1="60" x2="74" y2="36"  stroke="#d946ef" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="34" y1="60" x2="74" y2="84"  stroke="#d946ef" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="74" y1="36" x2="74" y2="84"  stroke="#a855f7" stroke-width="1"   stroke-opacity="0.3"/>
  <line x1="74" y1="36" x2="102" y2="50" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="74" y1="84" x2="102" y2="70" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="102" y1="50" x2="102" y2="70" stroke="#818cf8" stroke-width="1"  stroke-opacity="0.3"/>

  <!-- MAIN NODE: terminal window -->
  <rect x="16" y="44" width="36" height="32" rx="4" class="term-bg"/>
  <rect x="16" y="44" width="36" height="32" rx="4" fill="none" stroke="url(#term-v5)" stroke-width="1.5"/>
  <!-- Mini traffic lights -->
  <circle cx="24" cy="52" r="2.5" fill="#ff5f57" opacity="0.9"/>
  <circle cx="31" cy="52" r="2.5" fill="#febc2e" opacity="0.9"/>
  <circle cx="38" cy="52" r="2.5" fill="#28c840" opacity="0.9"/>
  <!-- Mini separator -->
  <line x1="16" y1="57" x2="52" y2="57" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Mini prompt -->
  <text x="21" y="69" font-family="'Courier New',Courier,monospace" font-size="9"
        font-weight="700" fill="#a855f7">&gt;_</text>

  <!-- Secondary nodes -->
  <circle cx="74" cy="36" r="6"  fill="none" stroke="#a855f7" stroke-width="2"   stroke-opacity="0.8"/>
  <circle cx="74" cy="36" r="2.5" fill="#a855f7"/>
  <circle cx="74" cy="84" r="6"  fill="none" stroke="#a855f7" stroke-width="2"   stroke-opacity="0.8"/>
  <circle cx="74" cy="84" r="2.5" fill="#a855f7"/>

  <!-- Tertiary nodes -->
  <circle cx="102" cy="50" r="5"  fill="none" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="102" cy="50" r="2"  fill="#818cf8" opacity="0.9"/>
  <circle cx="102" cy="70" r="5"  fill="none" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="102" cy="70" r="2"  fill="#818cf8" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="126" y="53"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="34" font-weight="700" letter-spacing="-1"
        fill="url(#wm-v5)">cerebellum</text>
  <text x="128" y="76" class="sub-v5"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12.5" font-weight="400" letter-spacing="0.3">personal agent-readable second brain</text>
</svg>
